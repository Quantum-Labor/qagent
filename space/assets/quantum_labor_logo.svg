<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Quantum Labor logo">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E1B3A"/>
      <stop offset="100%" stop-color="#0F0F1A"/>
    </radialGradient>
    <linearGradient id="qbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>

  <!-- Bloch-sphere outline -->
  <circle cx="100" cy="100" r="48" fill="none" stroke="#5B21B6" stroke-width="1.5" opacity="0.55"/>
  <ellipse cx="100" cy="100" rx="48" ry="14" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.7"/>

  <!-- Three rotating electron-like orbits -->
  <g filter="url(#glow)">
    <ellipse cx="100" cy="100" rx="70" ry="22" fill="none" stroke="#5B21B6" stroke-width="1.6">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="100" rx="70" ry="22" fill="none" stroke="#06B6D4" stroke-width="1.6">
      <animateTransform attributeName="transform" type="rotate" from="60 100 100" to="420 100 100" dur="11s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="100" rx="70" ry="22" fill="none" stroke="#A78BFA" stroke-width="1.6">
      <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="17s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- |0> / |1> qubit poles -->
  <text x="100" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#06B6D4">|0&#x27E9;</text>
  <text x="100" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#A78BFA">|1&#x27E9;</text>

  <!-- Core qubit -->
  <circle cx="100" cy="100" r="9" fill="url(#qbit)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="4" fill="#FFFFFF" opacity="0.95"/>
</svg>
